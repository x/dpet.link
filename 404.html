<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      function parseYaml(text) {
        var result = {};
        var lines = text.split("\n");
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var trimmed = line.trim();
          if (!trimmed || trimmed.charAt(0) === "#") continue;
          var colonIndex = trimmed.indexOf(":");
          if (colonIndex === -1) continue;
          var key = trimmed.substring(0, colonIndex).trim();
          var value = trimmed.substring(colonIndex + 1).trim();
          if (
            (value.charAt(0) === '"' && value.charAt(value.length - 1) === '"') ||
            (value.charAt(0) === "'" && value.charAt(value.length - 1) === "'")
          ) {
            value = value.slice(1, -1);
          }
          if (key && value) {
            result[key] = value;
          }
        }
        return result;
      }

      function isUrl(url) {
        return /^https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{2,256}\.[a-z]{2,24}\b([-a-zA-Z0-9@:%_\+.~#?&//=]*)*$/.test(url);
      }

      function redirect() {
        var location = window.location;
        var shortName = location.pathname.split("/")[1];
        var homepage = location.protocol + "//" + location.hostname + (location.port ? ":" + location.port : "");

        if (!shortName) {
          location.replace(homepage);
          return;
        }

        var xhr = new XMLHttpRequest();

        xhr.onload = function () {
          try {
            var links = parseYaml(xhr.response);
            var target = links[shortName];

            if (!target || !isUrl(target) || new URL(target).hostname === location.hostname) {
              location.replace(homepage);
            } else {
              location.replace(target);
            }
          } catch (e) {
            location.replace(homepage);
          }
        };

        xhr.onerror = function () {
          location.replace(homepage);
        };

        xhr.open("GET", "/links.yaml");
        xhr.send();
      }

      redirect();
    </script>
  </head>
  <body></body>
</html>
